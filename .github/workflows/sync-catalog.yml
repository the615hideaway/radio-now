name: Sync Google Sheet to JSON

on:
  workflow_dispatch:
  schedule:
    # Form Responses 1 → songs.json every 5 minutes (live catalog within ~5 min)
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync sheet to songs.json
        shell: pwsh
        run: ./scripts/sync-sheet-to-json.ps1

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/songs.json data/covers
          if git diff --staged --quiet; then
            echo "No catalog changes"
            exit 0
          fi
          git commit -m "Sync catalog from Google Sheet"
          git push