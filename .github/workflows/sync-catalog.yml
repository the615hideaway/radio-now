name: Sync Google Sheet to JSON

on:
  workflow_dispatch:
  # Schedule removed â€” deploy-pages.yml syncs every 10 min. A second scheduled
  # sync here raced with deploy and caused failed Pages deploys.

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync sheet to songs.json
        shell: pwsh
        run: ./scripts/sync-sheet-to-json.ps1

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/songs.json data/covers
          if git diff --staged --quiet; then
            echo "No catalog changes"
            exit 0
          fi
          git commit -m "Sync catalog from Google Sheet"
          git push