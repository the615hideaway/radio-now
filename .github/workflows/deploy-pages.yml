name: Deploy Radio Now to GitHub Pages

on:
  push:
    branches: [main]
  # Form Responses 1 → songs.json → live site (every 10 min)
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync sheet to songs.json
        shell: pwsh
        run: ./scripts/sync-sheet-to-json.ps1

      - name: Verify catalog sync
        shell: pwsh
        run: |
          if (-not (Test-Path data/songs.json)) {
            Write-Error 'data/songs.json was not created'
            exit 1
          }
          $catalog = Get-Content data/songs.json -Raw | ConvertFrom-Json
          Write-Host "Catalog has $($catalog.songCount) songs (synced $($catalog.syncedAt))"
          if ($catalog.songCount -lt 1) {
            Write-Error 'Catalog sync produced zero songs'
            exit 1
          }

      - name: Commit catalog updates
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/songs.json data/covers
          git status --short
          if git diff --staged --quiet; then
            echo "No catalog changes"
            exit 0
          fi
          if ! git diff --staged --quiet -- data/songs.json; then
            echo "songs.json updated"
          else
            echo "WARNING: covers changed but songs.json did not — check sync output path"
          fi
          git commit -m "Sync catalog from Google Sheet [skip ci]"
          pushed=0
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin main; then
              pushed=1
              break
            fi
            echo "Push attempt $attempt failed; retrying after rebase..."
            sleep 3
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::warning::Could not push catalog sync commit; deploy will still use synced files from this run"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4