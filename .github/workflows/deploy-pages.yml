name: Deploy Radio Now to GitHub Pages

on:
  push:
    branches: [main]
  # Form Responses 1 → songs.json → live site (every 10 min)
  schedule:
    - cron: '3,13,23,33,43,53 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync sheet to songs.json
        shell: pwsh
        run: ./scripts/sync-sheet-to-json.ps1

      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/songs.json data/covers
          if git diff --staged --quiet; then
            echo "No catalog changes"
            exit 0
          fi
          git commit -m "Sync catalog from Google Sheet"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4