<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Radio Now — Browse artists and their songs.">
  <title>Artists — Radio Now</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="login-gate" class="login-gate">
    <div class="login-card">
      <div class="brand-lockup brand-lockup--centered">
        <img src="assets/logo.jpg" alt="(615) Hideaway Entertainment" class="brand-logo brand-logo--large">
        <div class="brand-text">
          <h1>Radio Now</h1>
          <p>(615) Hideaway Entertainment</p>
        </div>
      </div>
      <p class="login-copy">Radio programmer sign-in. Create a DJ account to browse the catalog, preview tracks, and download music.</p>

      <div class="auth-tabs" role="tablist" aria-label="DJ account">
        <button type="button" class="auth-tab active" data-auth-tab="login" role="tab" aria-selected="true">Sign In</button>
        <button type="button" class="auth-tab" data-auth-tab="signup" role="tab" aria-selected="false">Create Account</button>
      </div>

      <form id="login-form" class="auth-panel" data-auth-panel="login">
        <div class="login-error" id="login-error"></div>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@station.com" autocomplete="email" required>
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fa-solid fa-right-to-bracket"></i>
          Sign In
        </button>
      </form>

      <form id="signup-form" class="auth-panel hidden" data-auth-panel="signup">
        <div class="login-error" id="signup-error"></div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fa-solid fa-user-plus"></i>
          Create DJ Account
        </button>
      </form>
    </div>
  </div>

  <div id="app-shell" class="app-shell hidden">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="brand">
          <img src="assets/logo.jpg" alt="(615) Hideaway Entertainment" class="brand-logo">
          <div class="brand-text">
            <span class="brand-name">Radio Now</span>
            <span class="brand-tag">(615) Hideaway Entertainment</span>
          </div>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html" class="nav-link">Catalog</a>
          <a href="artists.html" class="nav-link active">Artists</a>
          <a href="charts.html" class="nav-link">Charts</a>
          <a href="dj-dashboard.html" class="nav-link">DJ Dashboard</a>
          <a href="artist-dashboard.html" class="nav-link">Artist Dashboard</a>
        </nav>
        <div class="header-actions">
          <span id="dj-welcome" class="dj-welcome hidden"></span>
          <button class="btn btn-ghost" id="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Log Out
          </button>
        </div>
      </div>
    </header>

    <div id="connection-banner" class="connection-banner hidden"></div>

    <main class="artists-page">
      <section class="toolbar artists-toolbar">
        <div class="stats-row">
          <div class="stat"><span id="stat-artists">0</span><label>Artists</label></div>
          <div class="stat"><span id="stat-songs">0</span><label>Songs</label></div>
        </div>
        <div class="filter-row">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="artist-search" placeholder="Search artists…" autocomplete="off">
          </div>
          <button class="btn btn-secondary" id="clear-search-btn">Clear</button>
        </div>
        <p class="artists-help">Tap an artist to open their profile and queue songs.</p>
      </section>

      <section id="artists-grid" class="artists-grid" aria-live="polite"></section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/dj-auth.js"></script>
  <script src="js/dj-signup-form.js"></script>
  <script src="js/dj-auth-ui.js"></script>
  <script src="js/dj-favorites.js"></script>
  <script src="js/dj-activity.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/artists-app.js"></script>
</body>
</html>
