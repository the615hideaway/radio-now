<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Radio Now — Browse artists and their songs.">
  <title>Artists — Radio Now</title>
  <link rel="icon" href="assets/logo.jpg" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="login-gate" class="login-gate">
    <div class="login-card">
      <div class="brand-lockup brand-lockup--centered">
        <img src="assets/logo.jpg" alt="(615) Hideaway Entertainment" class="brand-logo brand-logo--large">
        <div class="brand-text">
          <h1>Radio Now</h1>
          <p>(615) Hideaway Entertainment</p>
        </div>
      </div>
      <p class="login-copy">Authorized radio programmers only. Enter the access password to browse artists.</p>
      <form id="login-form">
        <div class="login-error" id="login-error">Incorrect password. Please try again.</div>
        <label for="password">Access Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fa-solid fa-right-to-bracket"></i>
          Enter Catalog
        </button>
      </form>
    </div>
  </div>

  <div id="app-shell" class="app-shell hidden">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="brand">
          <img src="assets/logo.jpg" alt="(615) Hideaway Entertainment" class="brand-logo">
          <div class="brand-text">
            <span class="brand-name">Radio Now</span>
            <span class="brand-tag">(615) Hideaway Entertainment</span>
          </div>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html" class="nav-link">Catalog</a>
          <a href="artists.html" class="nav-link active">Artists</a>
        </nav>
        <div class="header-actions">
          <button class="btn btn-ghost" id="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>
            Log Out
          </button>
        </div>
      </div>
    </header>

    <div id="connection-banner" class="connection-banner hidden"></div>

    <main class="artists-page">
      <section class="toolbar artists-toolbar">
        <div class="stats-row">
          <div class="stat"><span id="stat-artists">0</span><label>Artists</label></div>
          <div class="stat"><span id="stat-songs">0</span><label>Songs</label></div>
        </div>
        <div class="filter-row">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="artist-search" placeholder="Search artists…" autocomplete="off">
          </div>
          <button class="btn btn-secondary" id="clear-search-btn">Clear</button>
        </div>
        <p class="artists-help">Tap an artist to open their profile and queue songs.</p>
      </section>

      <section id="artists-grid" class="artists-grid" aria-live="polite"></section>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/database.js"></script>
  <script src="js/artists-app.js"></script>
</body>
</html>
